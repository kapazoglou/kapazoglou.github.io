<h1 id="turn">Turn</h1>

<p><code class="language-plaintext highlighter-rouge">rollDice</code>, <code class="language-plaintext highlighter-rouge">confirmTurn(onGameOver)</code>, <code class="language-plaintext highlighter-rouge">resetGame</code>, <code class="language-plaintext highlighter-rouge">handleRollButton(onGameOver)</code>, <code class="language-plaintext highlighter-rouge">evaluateGameOver(context)</code>, <code class="language-plaintext highlighter-rouge">shouldWarnOnLeave()</code>.</p>

<p>Game over when: <code class="language-plaintext highlighter-rouge">dicePool &lt; nRoll</code> (idle roll click), or no legal tray placements (fresh roll). <code class="language-plaintext highlighter-rouge">nPlaces</code> still blocks new columns during play but does not end the game.</p>
