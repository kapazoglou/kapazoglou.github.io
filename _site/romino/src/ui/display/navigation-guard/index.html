<h1 id="navigation-guard">Navigation guard</h1>

<p><code class="language-plaintext highlighter-rouge">initNavigationGuard()</code> — registers <code class="language-plaintext highlighter-rouge">beforeunload</code> when <code class="language-plaintext highlighter-rouge">shouldWarnOnLeave()</code> is true (browser-native confirm dialog; message text is not customizable per spec).</p>
