<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <title>römino</title>
  <script type="module" crossorigin src="/assets/index-CUovf-bh.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-D49QAAq4.css">
</head>
<body>
<div id="app">
  <div class="template" data-name="template">

    <!-- Discards (hidden visually, used for game logic) -->
    <div class="discards" data-name="discards" aria-hidden="true">
      <div class="discard-labels" id="discard-labels"></div>
      <div class="discard-stacks" id="discard-stacks"></div>
    </div>

    <!-- Overlay region: tint strip + HUD + discovery grid -->
    <div class="grid-overlay">
      <div id="hud">
        <div class="hud-left">
          <span id="card-count">52</span>
          <div id="cool-off-row" class="cool-off-row" hidden></div>
        </div>
        <span id="score-display">0🪙</span>
      </div>
      <div id="discovery-grid-wrap" class="discovery-grid-wrap" hidden>
        <div id="discovery-grid" class="go-cards-grid go-cards-grid--four-square" aria-hidden="true"></div>
      </div>
    </div>

    <!-- Card grid -->
    <div id="grid-container"></div>

    <!-- Action bar: shows converter cards or dice depending on phase -->
    <div class="action-bar" data-name="action_bar" id="action-bar"></div>

  </div>
</div>

<!-- Drag ghost -->
<div id="drag-ghost"></div>

<!-- Settings panel (secret: tap card-count 4×) -->
<div id="settings-panel" aria-hidden="true">
  <div id="settings-content">
    <button id="settings-back" aria-label="Back">←</button>
    <h2 id="settings-title">SETTINGS</h2>
    <div id="settings-toggles">
      <!-- toggles added here -->
    </div>
  </div>
</div>

<!-- Game-over bottom sheet -->
<div id="game-over-overlay" class="game-over-overlay" aria-hidden="true">
  <div class="game-over-dialog" role="alertdialog" aria-modal="true" aria-labelledby="game-over-title">

    <!-- Tappable handle — toggles minimized state -->
    <div class="go-handle" id="go-handle">
      <div class="go-handle-bar"></div>
      <div class="go-handle-row">
        <div class="game-over-title" id="game-over-title">GAME OVER</div>
        <button class="game-over-btn" id="game-over-restart">play again</button>
      </div>
    </div>

    <!-- Collapsible body -->
    <div class="go-inner">
      <div class="go-body">
        <!-- reason (if any) -->
        <div class="game-over-reason" id="game-over-reason"></div>

        <!-- cards discovered -->
        <div class="go-stat-row">
          <span class="go-stat-value" id="go-cards-count">0</span>
          <span class="go-stat-label">cards discovered</span>
        </div>

        <!-- discovered cards grid -->
        <div class="go-cards-grid" id="go-cards-grid"></div>

        <!-- sweeps breakdown -->
        <div class="go-section-label">sweeps</div>
        <div class="go-sweeps" id="go-sweeps"></div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
