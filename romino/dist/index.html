<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <title>römino</title>
  <script type="module" crossorigin src="/assets/index-CG_3tjpZ.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DxiUwqK4.css">
</head>
<body>
<div id="app">
  <div class="viewport">
    <div class="viewport-inner">
      <div class="template" data-name="template">
        <header id="hud" class="hud"></header>
        <div id="placement-row" class="placement-row"></div>
        <hr class="separator" aria-hidden="true">
        <div id="action-bar" class="action-bar"></div>
      </div>
      <div id="settings-panel" aria-hidden="true">
        <div id="settings-content">
          <button id="settings-back" aria-label="Back">←</button>
          <h2 id="settings-title">SETTINGS</h2>
          <div id="settings-toggles"></div>
        </div>
      </div>
      <div id="game-over-overlay" class="game-over-overlay" aria-hidden="true">
        <div class="game-over-dialog" role="alertdialog" aria-modal="true" aria-labelledby="game-over-title">
          <div class="go-handle" id="go-handle">
            <div class="go-handle-bar"></div>
            <div class="go-handle-row">
              <div class="game-over-title" id="game-over-title">GAME OVER</div>
              <button type="button" class="game-over-btn" id="game-over-restart">PLAY AGAIN</button>
            </div>
          </div>
          <div class="go-inner">
            <div class="go-body">
              <div class="game-over-reason" id="game-over-reason"></div>
              <div class="go-stat-row">
                <span class="go-stat-value" id="go-score-value">0</span>
                <span class="go-stat-label">swept points</span>
              </div>
              <div class="go-session-stats" id="go-session-stats">
                <span><strong id="go-rolls-value">0</strong> rolls</span>
                <span class="go-stat-sep" aria-hidden="true">·</span>
                <span><strong id="go-sweeps-count-value">0</strong> sweeps</span>
              </div>
              <div class="go-section-label">sweeps</div>
              <div class="go-sweeps" id="go-sweeps"></div>
              <div class="go-section-label">high scores</div>
              <div class="go-leaderboard" id="go-leaderboard"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
