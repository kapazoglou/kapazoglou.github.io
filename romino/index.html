<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <title>römino</title>
  <link rel="stylesheet" href="base.css">
</head>
<body>
<div id="app">
  <div class="viewport">
    <div class="viewport-inner">
      <div class="template" data-name="template">
        <header id="hud" class="hud"></header>
        <div id="placement-row" class="placement-row"></div>
        <hr class="separator" aria-hidden="true">
        <div id="action-bar" class="action-bar"></div>
      </div>
      <div id="settings-panel" aria-hidden="true">
        <div id="settings-content">
          <button id="settings-back" aria-label="Back">←</button>
          <h2 id="settings-title">SETTINGS</h2>
          <div id="settings-toggles"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="drag-ghost"></div>

<script type="module" src="src/main.js"></script>
</body>
</html>
